services:
  app:
    build: .
    container_name: talentmatch_app
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - "8080:8001"
    command: php artisan serve --host=0.0.0.0 --port=8000
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: talentmatch
      DB_USERNAME: talentmatch
      DB_PASSWORD: talentmatch
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: database
    depends_on:
      - mysql
      - redis
    networks:
      - talentmatch

  mysql:
    image: mysql:8.0
    container_name: talentmatch_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: talentmatch
      MYSQL_USER: talentmatch
      MYSQL_PASSWORD: talentmatch
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - talentmatch

  redis:
    image: redis:7-alpine
    container_name: talentmatch_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - talentmatch

  queue:
    build: .
    container_name: talentmatch_queue
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    command: php artisan queue:work --tries=3
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: talentmatch
      DB_USERNAME: talentmatch
      DB_PASSWORD: talentmatch
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: database
    depends_on:
      - app
      - mysql
      - redis
    networks:
      - talentmatch

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: talentmatch_phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    depends_on:
      - mysql
    networks:
      - talentmatch

networks:
  talentmatch:
    driver: bridge

volumes:
  mysql_data:
    driver: local